<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A simple website deployed with Core Deploy." />
    <title>Core Deploy</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #f8fafc; background: #0f172a; }
      main { width: min(680px, calc(100% - 3rem)); padding: 4rem; border: 1px solid #334155; border-radius: 24px; background: linear-gradient(145deg, #1e293b, #0f172a); box-shadow: 0 24px 70px #02061788; }
      .eyebrow { margin: 0 0 1rem; color: #5eead4; font-size: .78rem; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(2.7rem, 9vw, 5rem); line-height: .95; letter-spacing: -.07em; }
      p { max-width: 44ch; margin: 1.5rem 0 0; color: #cbd5e1; font-size: 1.1rem; line-height: 1.7; }
      a { display: inline-block; margin-top: 2rem; padding: .8rem 1.1rem; border-radius: 999px; background: #5eead4; color: #042f2e; font-weight: 800; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Core Deploy</p>
      <h1>It works.</h1>
      <p>A tiny, fast website with a calm place to grow.</p>
      <a href="mailto:hello@example.com">Say hello</a>
    </main>
  </body>
</html>
